<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ημερολόγιο Ύπνου — Sleep Diary</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e3654">
<link rel="apple-touch-icon" href="icon-192.png">
<script src="config.js"></script>
<style>
  :root{
    --bg:#f9f5ee; --bg2:#e9e6f3; --card:#fffdf9; --ink:#3b3a52; --muted:#8d8a9c;
    --accent:#2e3654; --accent-soft:#eceef7; --teal:#69b4ae; --good:#4a9a93; --warn:#b0763a;
    --border:#efeae0; --radius:26px; --glow:0 10px 34px rgba(94,84,142,.10);
  }
  *{box-sizing:border-box; margin:0; padding:0}
  html{min-height:100%}
  body{font-family:-apple-system,"SF Pro Rounded","Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    background:var(--bg); color:var(--ink); font-size:17.5px; line-height:1.65; letter-spacing:.005em}
  body::before{content:""; position:fixed; inset:0; z-index:-1;
    background:linear-gradient(168deg,var(--bg) 0%,var(--bg2) 100%)}
  .wrap{max-width:680px; margin:0 auto; padding:20px 18px 130px}
  header{display:flex; align-items:center; justify-content:space-between; padding:16px 4px 20px}
  header h1{font-size:1.35rem; font-weight:800; color:var(--accent); letter-spacing:.02em}
  header .sub{font-size:.8rem; color:var(--muted)}
  .langbtn{border:none; background:rgba(255,253,249,.85); border-radius:999px;
    padding:8px 18px; font-size:.9rem; cursor:pointer; color:var(--accent);
    box-shadow:0 4px 14px rgba(94,84,142,.12); font-weight:600}
  .card{background:var(--card); border:none; border-radius:var(--radius);
    padding:26px 24px; margin-bottom:18px; box-shadow:var(--glow);
    animation:rise .5s cubic-bezier(.22,.8,.36,1)}
  @keyframes rise{from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:none}}
  .card h2{font-size:1.12rem; margin-bottom:6px; color:var(--accent); letter-spacing:.015em}
  .card .hint{font-size:.88rem; color:var(--muted); margin-bottom:16px}
  label{display:block; font-weight:650; margin:20px 0 8px; font-size:.98rem}
  label .qnum{display:inline-block; background:var(--accent-soft); color:var(--accent);
    border-radius:999px; padding:0 10px; margin-right:8px; font-size:.82rem}
  input[type=time],input[type=number],input[type=date],input[type=email],input[type=text],input[type=password],select,textarea{
    width:100%; padding:14px 16px; font-size:1.05rem; border:1.5px solid transparent;
    border-radius:16px; background:#f5f1e9; color:var(--ink); transition:all .25s}
  input:focus,textarea:focus{outline:none; border-color:var(--teal); background:#fffdf9;
    box-shadow:0 0 0 4px rgba(105,180,174,.14)}
  /* iOS Safari ignores text-align on date inputs — center the value via its WebKit pseudo-element */
  input[type=date]{text-align:center}
  input[type=date]::-webkit-date-and-time-value{text-align:center; width:100%}
  input[type=date]::-webkit-datetime-edit{text-align:center; width:100%}
  textarea{min-height:88px; resize:vertical}
  .row{display:flex; gap:10px}
  .row>*{flex:1}
  .quality{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px}
  .quality button{flex:1; min-width:92px; padding:12px 8px; border:1.5px solid transparent;
    background:#f5f1e9; border-radius:999px; cursor:pointer; font-size:.9rem;
    color:var(--ink); transition:all .25s}
  .quality button.sel{border-color:var(--teal); background:var(--accent-soft); font-weight:700;
    box-shadow:0 4px 12px rgba(105,180,174,.22)}
  .btn{display:inline-block; width:100%; padding:16px; margin-top:20px; font-size:1.05rem;
    font-weight:700; color:#fff; letter-spacing:.02em; cursor:pointer; border:none;
    background:linear-gradient(135deg,#2e3654 0%,#48577d 100%); border-radius:999px;
    box-shadow:0 10px 24px rgba(46,54,84,.28); transition:transform .2s, box-shadow .2s}
  .btn.secondary{background:transparent; color:var(--accent); border:1.5px solid var(--teal);
    margin-top:12px; box-shadow:none}
  .btn:active{transform:scale(.98); box-shadow:0 4px 12px rgba(46,54,84,.2)}
  nav{position:fixed; bottom:14px; left:50%; transform:translateX(-50%);
    width:min(560px, calc(100% - 16px)); background:rgba(255,253,249,.88);
    backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
    border:1px solid rgba(255,255,255,.7); border-radius:999px;
    box-shadow:0 14px 36px rgba(60,55,90,.18);
    display:flex; justify-content:space-around; padding:8px 4px; z-index:5}
  nav button{background:none; border:none; font-size:.74rem; color:var(--muted); cursor:pointer;
    flex:1 1 0; min-width:0; white-space:nowrap;
    display:flex; flex-direction:column; align-items:center; gap:1px; padding:6px 2px;
    border-radius:999px; transition:all .25s}
  nav button.active{color:var(--accent); font-weight:700; background:var(--accent-soft)}
  nav button .ico{font-size:1.3rem}
  /* narrow portrait phones: shrink the tab labels a little so all 5 fit (icons stay large) */
  @media(max-width:430px){ nav button{font-size:.66rem} }
  table{width:100%; border-collapse:collapse; font-size:.88rem}
  th,td{padding:10px 6px; text-align:center; border-bottom:1px solid #f2eee6}
  th{color:var(--muted); font-weight:600; font-size:.76rem; letter-spacing:.03em}
  .metric-grid{display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:12px; margin-top:10px}
  .metric{background:linear-gradient(145deg,#edeff8 0%,#e8f3f1 100%);
    border-radius:20px; padding:16px 12px; text-align:center}
  .metric .v{font-size:1.5rem; font-weight:800; color:var(--accent)}
  .metric .l{font-size:.74rem; color:var(--muted)}
  .warnbox{background:#fdf3e7; border:none; color:#7a5320; border-radius:16px;
    padding:14px 16px; font-size:.9rem; margin-top:14px}
  .okbox{background:#e8f3ef; border:none; color:#2c5e46; border-radius:16px;
    padding:14px 16px; font-size:.95rem; margin-top:14px}
  .note-entry{border-bottom:1px solid #f2eee6; padding:12px 0}
  .note-entry .d{font-size:.78rem; color:var(--muted)}
  .chip{display:inline-block; background:var(--accent-soft); color:var(--accent); border-radius:999px;
    padding:5px 14px; font-size:.85rem; margin:3px 4px 3px 0}
  .reminder{display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #f2eee6}
  .reminder input{width:23px; height:23px; accent-color:var(--teal)}
  .reminder.done span{text-decoration:line-through; color:var(--muted)}
  .small{font-size:.8rem; color:var(--muted); margin-top:10px}
  svg text{font-family:inherit}
  .footer-note{font-size:.72rem; color:var(--muted); text-align:center; margin-top:24px; line-height:1.5}
  @media(max-width:480px){ body{font-size:16px} .row{flex-direction:column; gap:0}
    table{font-size:.72rem} th,td{padding:8px 3px} th{font-size:.64rem} }
  #splash{position:fixed; inset:0; background:linear-gradient(168deg,var(--bg) 0%,var(--bg2) 100%); z-index:50;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; padding:28px; opacity:0; transform:scale(.985);
    animation:splashIn 1.7s cubic-bezier(.22,.6,.3,1) .15s forwards}
  #splash.hide{animation:splashOut 1.5s cubic-bezier(.4,0,.2,1) forwards}
  #splash .nm{font-size:1.3rem; font-weight:800; color:var(--accent); margin-top:18px}
  #splash .nm span{font-weight:500}
  #splash .ti{font-size:1.02rem; color:var(--accent); margin-top:4px}
  #splash .af{font-size:.92rem; color:var(--teal); font-weight:600; margin-top:10px}
  #splash .breathe{animation:breathe 3.2s ease-in-out infinite}
  @keyframes splashIn{to{opacity:1; transform:scale(1)}}
  @keyframes splashOut{0%{opacity:1; filter:blur(0)}
    100%{opacity:0; filter:blur(14px); transform:scale(1.03); visibility:hidden}}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
  .timebtn{width:100%; padding:14px 22px; font-size:1.18rem; border:1.5px solid transparent;
    border-radius:999px; background:#f5f1e9; color:var(--ink); text-align:left; cursor:pointer;
    font-variant-numeric:tabular-nums; letter-spacing:.04em; transition:all .25s}
  .timebtn:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 4px rgba(105,180,174,.14)}
  .timebtn.empty{color:var(--muted)}
  .sheet-ov{position:fixed; inset:0; background:rgba(40,38,60,.35); backdrop-filter:blur(5px);
    -webkit-backdrop-filter:blur(5px); z-index:40; opacity:0; transition:opacity .3s ease;
    display:flex; align-items:flex-end; justify-content:center}
  .sheet-ov.show{opacity:1}
  .sheet{position:relative; background:var(--card); border-radius:38px 38px 0 0; padding:24px 24px 32px;
    width:min(480px,100%); box-shadow:0 -12px 44px rgba(60,55,90,.28);
    transform:translateY(60px); transition:transform .38s cubic-bezier(.22,.8,.36,1)}
  .sheet-ov.show .sheet{transform:none}
  .typelink{position:absolute; top:16px; right:18px; z-index:2; border:none; cursor:pointer;
    background:var(--accent-soft); color:var(--accent); border-radius:999px;
    padding:7px 16px; font-size:.82rem; font-weight:700; letter-spacing:.03em}
  .wlabels{display:flex; justify-content:center; gap:4px; margin:6px 0 2px}
  .wlabels div{width:84px; text-align:center; font-size:.8rem; font-weight:700; color:var(--muted);
    letter-spacing:.04em}
  .wlabels .sep{width:14px}
  .typewrap{height:202px; display:flex; flex-direction:column; justify-content:center; padding:0 8px}
  .typewrap label{margin:0 0 10px; text-align:center; color:var(--muted); font-weight:600; font-size:.92rem}
  .typewrap input{text-align:center; font-size:1.5rem; font-variant-numeric:tabular-nums}
  .wheels{position:relative; display:flex; justify-content:center; gap:4px; height:200px}
  .wheel{position:relative; z-index:1; width:84px; overflow-y:auto; padding:80px 0;
    scroll-snap-type:y mandatory; scrollbar-width:none; -webkit-overflow-scrolling:touch;
    scroll-behavior:auto; overscroll-behavior:contain;
    mask-image:linear-gradient(transparent, #000 28%, #000 72%, transparent);
    -webkit-mask-image:linear-gradient(transparent, #000 28%, #000 72%, transparent)}
  .wheel::-webkit-scrollbar{display:none}
  .wi{height:40px; line-height:40px; text-align:center; font-size:1.4rem; color:var(--muted);
    scroll-snap-align:center; font-variant-numeric:tabular-nums;
    transition:color .18s, transform .18s, font-weight .18s}
  .wi.on{color:var(--accent); font-weight:750; transform:scale(1.14)}
  .wsep{align-self:center; font-size:1.4rem; font-weight:700; color:var(--accent); padding-bottom:4px}
  .wheel-hl{position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); z-index:0;
    width:296px; height:44px; border-radius:999px; background:var(--accent-soft)}
  .toast{position:fixed; bottom:104px; left:50%; transform:translateX(-50%) translateY(14px);
    background:var(--accent); color:#fff; border-radius:999px; padding:12px 24px;
    font-size:.95rem; font-weight:600; box-shadow:0 10px 30px rgba(46,54,84,.35);
    z-index:60; opacity:0; transition:all .35s ease; max-width:88%; text-align:center}
  .toast.show{opacity:1; transform:translateX(-50%) translateY(0)}
  #printArea{display:none}
  @media print{
    #printArea{display:block!important}
    .wrap, nav, #splash{display:none!important}
    body{background:#fff!important}
  }
</style>

  <main id="view"></main>

</div>

<nav>

</nav>

/* ---------- scoring ---------- */
function toMin(t){ if(!t) return null; const [h,m]=t.split(":").map(Number); return h*60+m; }
function anchor(t){ const m=toMin(t); return m===null?null:(m>=720? m-1440 : m); }
function metrics(e){
  const bed=anchor(e.q1), trySl=anchor(e.q2), finalWake=toMin(e.q6), outBed=toMin(e.q7);
  const sol=Number(e.q3)||0, waso=Number(e.q5)||0;
  if(bed===null||outBed===null) return null;
  const tib = outBed - bed;
  const preSleep = (trySl!==null && trySl>=bed) ? trySl-bed : 0;
  const terminal = (finalWake!==null && outBed>=finalWake) ? outBed-finalWake : 0;
  let tst = tib - preSleep - sol - waso - terminal;
  if(tst<0) tst=0;
  const se = tib>0 ? Math.round(tst/tib*100) : null;
  return {tib, tst, se, sol, waso};
}
const fmtDur = m => { if(m==null) return "—"; const h=Math.floor(m/60); return h+T().h+" "+String(m%60).padStart(2,"0")+T().min; };

/* ---------- rendering ---------- */
const $ = id => document.getElementById(id);
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function render(){

function toast(msg, ms=3000){
  let el=$("toast"); if(el) el.remove();
  el=document.createElement("div"); el.id="toast"; el.className="toast"; el.innerHTML=msg;
  document.body.appendChild(el);
  requestAnimationFrame(()=>el.classList.add("show"));
  clearTimeout(window._toastT);
  window._toastT=setTimeout(()=>{ el.classList.remove("show"); setTimeout(()=>el.remove(),400); }, ms);
}

/* ---------- time wheel picker ---------- */
const WI=40;
function timeBtn(id, val){
  return `<button type="button" class="timebtn ${val?"":"empty"}" id="${id}" data-v="${val}"
    onclick="openTime('${id}')">${val||"—:—"}</button>`;
}
function openTime(id){
  let ch=22, cm=0;
  const cur=$(id).dataset.v||"";
  if(/^\d{1,2}:\d{2}$/.test(cur)){ [ch,cm]=cur.split(":").map(Number); }
  const rawM=cm;
  cm = cm<15 ? 0 : cm<45 ? 30 : 0;
  if(cm===0 && rawM>=45){ ch=(ch+1)%24; }
  const h12=((ch+11)%12)+1, pm=ch>=12?1:0;
  const t=T();
  const ov=document.createElement("div"); ov.className="sheet-ov"; ov.id="sheetOv";
  ov.innerHTML=`<div class="sheet">
    <button type="button" class="typelink" id="typeToggle" onclick="toggleTypeMode()">${t.typeLbl}</button>
    <div id="wheelMode">
      <div class="wlabels"><div>${t.hourLbl}</div><div class="sep"></div><div>${t.minLbl}</div><div class="sep"></div><div>${t.am}/${t.pm}</div></div>
      <div class="wheels">
        <div class="wheel-hl"></div>
        <div class="wheel" id="whH">${Array.from({length:12},(_,i)=>`<div class="wi">${i+1}</div>`).join("")}</div>
        <div class="wsep">:</div>
        <div class="wheel" id="whM">${[0,30].map(m=>`<div class="wi">${String(m).padStart(2,"0")}</div>`).join("")}</div>
        <div class="wsep"></div>
        <div class="wheel" id="whA"><div class="wi">${t.am}</div><div class="wi">${t.pm}</div></div>
      </div>
    </div>
    <div id="typeMode" class="typewrap" style="display:none">
      <label>${t.typeHint}</label>
      <input type="time" id="typeInput" value="${cur}">
    </div>
    <button class="btn" style="margin-top:16px" onclick="confirmTime('${id}')">OK</button>
  </div>`;
  document.body.appendChild(ov);
  wheelInit($("whH")); wheelInit($("whM")); wheelInit($("whA"));
  $("whH").scrollTop=(h12-1)*WI; $("whM").scrollTop=(cm/30)*WI; $("whA").scrollTop=pm*WI;
  requestAnimationFrame(()=>ov.classList.add("show"));
  ov.addEventListener("click", e=>{ if(e.target===ov) closeSheet(); });
}
function toggleTypeMode(){
  const t=T(), w=$("wheelMode"), ty=$("typeMode"), toTyping=ty.style.display==="none";
  w.style.display=toTyping?"none":"";
  ty.style.display=toTyping?"":"none";
  $("typeToggle").textContent=toTyping?t.wheelLbl:t.typeLbl;
  if(toTyping) $("typeInput").focus();
}
function wheelInit(el){
  const upd=()=>{ const i=Math.round(el.scrollTop/WI);
    [...el.children].forEach((c,j)=>c.classList.toggle("on", j===i)); };
  el.addEventListener("scroll", ()=>requestAnimationFrame(upd));
  let lastTick=0;
  el.addEventListener("wheel", e=>{
    e.preventDefault();
    const now=Date.now(); if(now-lastTick<140) return; lastTick=now;
    const max=(el.children.length-1)*WI;
    const target=Math.max(0, Math.min(max, (Math.round(el.scrollTop/WI)+Math.sign(e.deltaY))*WI));
    el.scrollTo({top:target, behavior:"smooth"});
  }, {passive:false});
  upd();
}
function closeSheet(){
  const ov=$("sheetOv"); if(!ov) return;
  ov.classList.remove("show"); setTimeout(()=>ov.remove(), 320);
}
function confirmTime(id){
  let val;
  if($("typeMode").style.display!=="none"){
    val=$("typeInput").value;
    if(!/^\d{2}:\d{2}$/.test(val)) return;
  } else {
    const h12=Math.min(Math.round($("whH").scrollTop/WI), 11)+1;
    const m=Math.min(Math.round($("whM").scrollTop/WI), 1)*30;
    const pm=Math.min(Math.round($("whA").scrollTop/WI), 1)===1;
    const h24=(h12%12)+(pm?12:0);
    val=String(h24).padStart(2,"0")+":"+String(m).padStart(2,"0");
  }
  const b=$(id); b.dataset.v=val; b.textContent=val; b.classList.remove("empty");
  closeSheet();
}

function bindToday(){
  document.querySelectorAll("#f_q8 button").forEach(b=>{
    b.onclick=()=>{ qualitySel=Number(b.dataset.i);
      document.querySelectorAll("#f_q8 button").forEach(x=>x.classList.toggle("sel", x===b)); };
  });
  $("saveBtn").onclick=()=>{
    const t=T();
    const tv=id=>$(id).dataset.v||"";
    const e={ q1:tv("f_q1"), q2:tv("f_q2"), q3:$("f_q3").value, q4:$("f_q4").value,
              q5:$("f_q5").value, q6:tv("f_q6"), q7:tv("f_q7"), q8:qualitySel,
              q9:$("f_q9").value.trim(), submittedAt:new Date().toISOString() };
    const m=metrics(e);
    const bad = m && (m.tst===0 || m.tib<=0 || m.tib>16*60);
    const missing = !e.q1 || !e.q7 || e.q8==null;
    if((bad||missing) && !$("formWarn").dataset.warned){
      $("formWarn").innerHTML=`<div class="warnbox">${missing?t.missingWarn:t.implausible}</div>`;
      $("formWarn").dataset.warned="1"; return;
    }
    const dateKey=$("f_date").value;
    const all=entries();
    if(!window.cloudUser && !(dateKey in all) && Object.keys(all).length>=1){   // guest may keep one day only
      $("view").insertAdjacentHTML("afterbegin",`<div class="warnbox">${t.guestLimit}</div>`);
      window.scrollTo(0,0);
      if(window.cloudAuthClick) setTimeout(()=>window.cloudAuthClick(),500);     // offer sign-in
      return;
    }
    all[dateKey]=e; save("csd_entries",all);
    if(window.cloudPushEntry) window.cloudPushEntry(dateKey, e);
    $("view").insertAdjacentHTML("afterbegin",`<div class="okbox">${t.saved}</div>`);
    setTimeout(()=>go("diary"),900);
  };
}

/* ---------- Diary ---------- */
function lastNDays(n){
  const out=[], d=new Date();
  for(let i=0;i<n;i++){ const iso=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");
    out.push(iso); d.setDate(d.getDate()-1); }
  return out;
}
function vDiary(){
  const t=T(), all=entries(), days=lastNDays(14);
  const rows=days.map(d=>{
    const e=all[d]; if(!e) return `<tr><td>${d.slice(5)}</td><td colspan="5" style="color:var(--muted)">—</td></tr>`;
    const m=metrics(e);
    return `<tr><td>${d.slice(5)}</td>
      <td><b>${m?fmtDur(m.tst):"—"}</b></td>
      <td>${m&&m.se!=null?m.se+"%":"—"}</td>
      <td>${e.q3||0}${T().min}</td>
      <td>${e.q5||0}${T().min}</td>
      <td>${e.q8!=null?t.quality[e.q8]:"—"}</td></tr>`;
  }).join("");
  const week=days.slice(0,7).map(d=>all[d]).filter(Boolean).map(metrics).filter(Boolean);
  let avg="";
  if(week.length){
    const a=f=>Math.round(week.reduce((s,m)=>s+m[f],0)/week.length);
    avg=`<div class="card"><h2>${t.weekAvg}</h2><div class="metric-grid">
      <div class="metric"><div class="v">${fmtDur(a("tst"))}</div><div class="l">${t.colTST}</div></div>
      <div class="metric"><div class="v">${a("se")}%</div><div class="l">${t.seLine}</div></div>
      <div class="metric"><div class="v">${a("sol")}${T().min}</div><div class="l">${t.colSOL}</div></div>
      <div class="metric"><div class="v">${a("waso")}${T().min}</div><div class="l">${t.colWASO}</div></div>
    </div></div>`;
  }
  const hasAny=Object.keys(all).length>0;
  return avg+`<div class="card"><h2>${t.diaryTitle}</h2><div class="hint">${t.diaryHint}</div>
    ${hasAny?`<table><tr><th>${t.colDate}</th><th>${t.colTST}</th><th>${t.colSE}</th><th>${t.colSOL}</th><th>${t.colWASO}</th><th>${t.colQ}</th></tr>${rows}</table>`
            :`<div class="hint">${t.noEntries}</div>`}</div>`;
}

/* ---------- Trends ---------- */
function vTrends(){
  const t=T(), all=entries();
  const days=lastNDays(14).reverse();
  const pts=days.map(d=>({d, m: all[d]?metrics(all[d]):null})).filter(p=>p.m);
  if(pts.length<3) return `<div class="card"><h2>${t.trendsTitle}</h2><div class="hint">${t.needMore}</div></div>`;
  const W=620,H=240,P=40;
  const x=i=>P+i*(W-2*P)/Math.max(pts.length-1,1);
  const ySE=v=>H-P-(v/100)*(H-2*P);
  const maxT=Math.max(...pts.map(p=>p.m.tst),480);
  const yT=v=>H-P-(v/maxT)*(H-2*P);
  const line=(fn,f)=>pts.map((p,i)=>(i?"L":"M")+x(i).toFixed(1)+","+fn(p.m[f]).toFixed(1)).join(" ");
  const dots=(fn,f,c)=>pts.map((p,i)=>`<circle cx="${x(i).toFixed(1)}" cy="${fn(p.m[f]).toFixed(1)}" r="4" fill="${c}"/>`).join("");
  return `<div class="card"><h2>${t.trendsTitle}</h2><div class="hint">${t.trendsHint}</div>
  <svg viewBox="0 0 ${W} ${H}" style="width:100%">
    ${[0,25,50,75,100].map(v=>`<line x1="${P}" x2="${W-P}" y1="${ySE(v)}" y2="${ySE(v)}" stroke="#eee"/>
      <text x="6" y="${ySE(v)+4}" font-size="10" fill="#999">${v}%</text>`).join("")}
    <path d="${line(ySE,'se')}" fill="none" stroke="#4a5d8a" stroke-width="2.5"/>${dots(ySE,'se','#4a5d8a')}
    <path d="${line(yT,'tst')}" fill="none" stroke="#3d7d5f" stroke-width="2" stroke-dasharray="5 4"/>${dots(yT,'tst','#3d7d5f')}
    ${pts.map((p,i)=>i%2?"":`<text x="${x(i)}" y="${H-8}" font-size="9" fill="#999" text-anchor="middle">${p.d.slice(5)}</text>`).join("")}
  </svg>
  <div><span class="chip" style="color:#4a5d8a">— ${t.seLine}</span>
       <span class="chip" style="color:#3d7d5f">- - ${t.tstLine}</span></div></div>`;
}

/* ---------- Wellbeing ---------- */
function companionSummary(){
  const t=T(), all=entries();
  const week=lastNDays(7).map(d=>({d,e:all[d]})).filter(x=>x.e);
  const ns=notes();
  if(week.length<3 && ns.length<3) return `<div class="hint">${t.compNoData}</div>`;
  const ms=week.map(x=>metrics(x.e)).filter(Boolean);
  const out=[t.sumIntro];
  if(ms.length>=3){
    const se=Math.round(ms.reduce((s,m)=>s+m.se,0)/ms.length);
    out.push(t.sumSE(se));
    const half=Math.floor(ms.length/2);
    const early=ms.slice(half).reduce((s,m)=>s+m.se,0)/(ms.length-half);
    const late =ms.slice(0,half).reduce((s,m)=>s+m.se,0)/half;
    out.push(late-early>3 ? t.sumTrendUp : early-late>3 ? t.sumTrendDown : t.sumTrendFlat);
  }
  const txt=ns.slice(-7).map(n=>n.text.toLowerCase()).join(" ");
  if(/καφ|caffe|coffee|coke|energy/.test(txt)) out.push(t.sumCaffeine);
  if(/άγχο|αγχ|stress|anxi|worr/.test(txt)) out.push(t.sumStress);
  return "<p>"+out.map(esc).join("</p><p>")+"</p>";
}

async function sendToDoctor(){
  const t=T();
  if(!Object.values(entries()).some(e=>metrics(e))){ toast(t.noDataYet, 4500); return; }  // need at least one night with usable times
  const clearToast=()=>{ const el=$("toast"); if(el){ el.classList.remove("show"); setTimeout(()=>el.remove(),300); } };
  toast(t.preparing, 60000);
  let blob=null;
  try{ blob=await reportPdfBlob(); }catch(e){}
  if(!blob){ clearToast(); printFallback(); markSaved(); return; }  // last-ditch: browser print dialog
  const file=new File([blob],"sleep-report.pdf",{type:"application/pdf"});
  // Phone: open the share sheet with the PDF attached (Mail, Gmail, WhatsApp, Viber…)
  if(navigator.canShare && navigator.canShare({files:[file]})){
    try{ await navigator.share({files:[file], title:t.mailSubject, text:t.mailBody}); clearToast(); markSaved(); return; }
    catch(err){ if(err && err.name==="AbortError"){ clearToast(); return; } }  // user cancelled the share
  }
  // Desktop / no share support: download the PDF, then open the mail app with a ready greeting
  const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download="sleep-report.pdf"; a.click(); URL.revokeObjectURL(a.href);
  clearToast(); toast(t.pdfReady, 6000); markSaved();

}

let _h2p=null;
function ensureHtml2pdf(){
  if(window.html2pdf) return Promise.resolve();
  if(!_h2p) _h2p=new Promise((res,rej)=>{
    const s=document.createElement("script");
    s.src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js";
    s.onload=res; s.onerror=()=>{_h2p=null; rej(new Error("cdn"));};
    document.head.appendChild(s);
  });
  return _h2p;
}
async function reportPdfBlob(){
  await ensureHtml2pdf();
  const el=document.createElement("div");
  el.style.cssText="position:absolute;left:0;top:0;width:780px;background:#fff;z-index:-2000";
  el.innerHTML=reportHTML(); document.body.prepend(el);
  try{
    const blob=await html2pdf().set({
      margin:[10,8,12,8],
      html2canvas:{scale:2, scrollX:0, scrollY:0, windowWidth:820, useCORS:true},
      jsPDF:{unit:"mm", format:"a4", orientation:"portrait"},
      pagebreak:{mode:["css","legacy"]}
    }).from(el).outputPdf("blob");
    if(!blob || blob.size<4000) throw new Error("blank pdf");
    return blob;
  } finally { el.remove(); }
}
function printFallback(){
  let pa=document.getElementById("printArea");
  if(!pa){ pa=document.createElement("div"); pa.id="printArea"; document.body.appendChild(pa); }

}

<script type="module">
/* ============ cloud layer: Supabase auth + sync + one-tap send ============ */
const cfg = window.CSD_CONFIG || {};
const configured = cfg.SUPABASE_URL && cfg.SUPABASE_ANON_KEY && !String(cfg.SUPABASE_URL).includes("PASTE");
if (configured) {
  try {
    const { createClient } = await import("https://esm.sh/@supabase/supabase-js@2");
    const sb = createClient(cfg.SUPABASE_URL, cfg.SUPABASE_ANON_KEY);

    async function pushEntry(date, e) {
      try {
        const { data: { user } } = await sb.auth.getUser(); if (!user) return;
        await sb.from("entries").upsert({
          user_id: user.id, date,
          q1: e.q1 || null, q2: e.q2 || null, q3: String(e.q3 ?? ""), q4: String(e.q4 ?? ""),
          q5: String(e.q5 ?? ""), q6: e.q6 || null, q7: e.q7 || null,
          q8: e.q8 ?? null, q9: e.q9 || null, submitted_at: e.submittedAt || new Date().toISOString(),
        }, { onConflict: "user_id,date" });
      } catch (err) { /* offline — kept in localStorage, resynced on reconnect or next load */ }
    }
    async function pullAll() {
      const { data: rows } = await sb.from("entries").select("*").order("date");
      const all = JSON.parse(localStorage.getItem("csd_entries") || "{}");
      const remoteDates = new Set();
      (rows || []).forEach(r => {
        remoteDates.add(r.date);
        all[r.date] = { q1: r.q1 || "", q2: r.q2 || "", q3: r.q3 || "", q4: r.q4 || "",
          q5: r.q5 || "", q6: r.q6 || "", q7: r.q7 || "", q8: r.q8, q9: r.q9 || "",
          submittedAt: r.submitted_at };
      });
      localStorage.setItem("csd_entries", JSON.stringify(all));
      for (const [d, e] of Object.entries(all)) if (!remoteDates.has(d)) pushEntry(d, e);
      window.render();
    }
    window.cloudPushEntry = pushEntry;
    window.cloudPushNote = async n => {
      try {
        const { data: { user } } = await sb.auth.getUser();
        if (user) await sb.from("notes").insert({ user_id: user.id, date: n.date, text: n.text });
      } catch (err) { /* offline — note kept in localStorage */ }
    };
    window.addEventListener("online", () => { if (window.cloudUser) pullAll(); }); // flush pending entries on reconnect
    window.cloudSend = async () => {
      try {
        const { data, error } = await sb.functions.invoke("send-report");
        if (error) return { ok: false, error: error.message };
        if (data && data.error) return { ok: false, error: data.error };
        return { ok: true };
      } catch (e) { return { ok: false, error: String(e) }; }
    };
    window.cloudLogout = async () => { await sb.auth.signOut(); location.reload(); };
    window.cloudAuthClick = () => showLogin();
    window.updateAuthBtn = () => {
      const b = document.getElementById("authBtn"); if (!b) return;
      if (window.cloudUser) { b.style.display = "none"; }
      else { b.style.display = ""; b.textContent = window.T().signInBtn; }
    };

    let authMode = "signin"; // "signin" | "signup"
    function showLogin() {
      if (document.getElementById("loginOv")) return;
      const t = window.T();
      const ov = document.createElement("div"); ov.className = "sheet-ov show"; ov.id = "loginOv";
      ov.style.alignItems = "center"; ov.style.zIndex = "45";
      const g = id => document.getElementById(id);
      const setMsg = (id, text) => { const m = g(id); m.textContent = text || ""; m.style.display = text ? "" : "none"; };
      const close = () => { document.removeEventListener("keydown", onKey); ov.remove(); };
      const onKey = e => { if (e.key === "Escape") close(); };
      document.addEventListener("keydown", onKey);
      ov.addEventListener("click", e => { if (e.target === ov) close(); }); // tap outside the card
      function paint() {
        const signup = authMode === "signup";
        ov.innerHTML = `<div class="sheet" style="border-radius:38px;max-width:420px;transform:none">
          <button id="liClose" aria-label="Close" style="position:absolute;top:14px;right:16px;border:none;background:var(--accent-soft);color:var(--accent);width:36px;height:36px;border-radius:999px;font-size:18px;line-height:1;cursor:pointer">✕</button>
          <h2 style="color:var(--accent);margin-bottom:6px">${t.loginTitle}</h2>
          <div class="hint">${signup ? t.signupHint : t.loginHint}</div>

          <div style="text-align:center;margin-top:16px">
            <a href="#" id="liToggle" style="color:var(--accent);text-decoration:underline;font-size:.9rem">${signup ? t.toSignin : t.toSignup}</a>
          </div>
          ${signup ? "" : `<div style="text-align:center;margin-top:10px">

        </div>`;
        wire();
      }
      function wire() {
        g("liClose").onclick = close;
        g("liToggle").onclick = e => { e.preventDefault(); authMode = authMode === "signup" ? "signin" : "signup"; paint(); };

        if (fg) fg.onclick = async e => {
          e.preventDefault();
          const email = g("liEmail").value.trim();

          const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.href.split("#")[0] });
          if (error) { g("liErr").textContent = error.message; return; } // surface real delivery/config failures
          setMsg("liMsg", t.resetSent);
        };
        g("liGo").onclick = async () => {
          const email = g("liEmail").value.trim();
          const pw = g("liPw").value;
          g("liErr").textContent = ""; setMsg("liMsg", "");
          if (!email || !pw) { g("liErr").textContent = t.needBoth; return; }
          if (authMode === "signup" && pw.length < 6) { g("liErr").textContent = t.pwTooShort; return; }
          g("liGo").disabled = true;
          try {
            if (authMode === "signup") {
              const { data, error } = await sb.auth.signUp({ email, password: pw, options: { emailRedirectTo: location.href.split("#")[0] } });
              if (error) { g("liErr").textContent = error.message; return; }
              if (data.session) { close(); ready(); }   // email confirmation OFF -> straight in
              else setMsg("liMsg", t.confirmSent);           // email confirmation ON  -> check inbox
            } else {
              const { error } = await sb.auth.signInWithPassword({ email, password: pw });
              if (error) { g("liErr").textContent = t.badCreds; return; }
              close(); ready();
            }
          } finally { g("liGo").disabled = false; }
        };
      }
      document.body.appendChild(ov);
      paint();
    }
    function showSetPassword() {
      if (document.getElementById("setPwOv")) return;
      const t = window.T();
      const lo = document.getElementById("loginOv"); if (lo) lo.remove();
      const ov = document.createElement("div"); ov.className = "sheet-ov show"; ov.id = "setPwOv";
      ov.style.alignItems = "center"; ov.style.zIndex = "46";
      ov.innerHTML = `<div class="sheet" style="border-radius:38px;max-width:420px;transform:none">
        <h2 style="color:var(--accent);margin-bottom:6px">${t.newPwTitle}</h2>
        <input type="password" id="npPw" placeholder="${t.newPwPh}" autocomplete="new-password">
        <button class="btn" id="npGo">${t.savePw}</button>
        <div class="small" id="npErr" style="color:#a33;margin-top:8px"></div>
      </div>`;
      document.body.appendChild(ov);
      const g = id => document.getElementById(id);
      g("npGo").onclick = async () => {
        const pw = g("npPw").value;
        if (pw.length < 6) { g("npErr").textContent = t.pwTooShort; return; }
        g("npGo").disabled = true;
        const { error } = await sb.auth.updateUser({ password: pw });
        g("npGo").disabled = false;
        if (error) { g("npErr").textContent = error.message; return; }
        history.replaceState(null, "", location.pathname + location.search); // drop the recovery token
        ov.remove(); toast(t.pwUpdated); ready();
      };
    }
    async function ready() {
      const { data: { user } } = await sb.auth.getUser();
      window.cloudUser = user;
      window.render();
      window.updateAuthBtn();
      pullAll();
    }
    sb.auth.onAuthStateChange((event) => {
      if (event === "PASSWORD_RECOVERY") showSetPassword(); // fired when the app opens from a reset link
    });
    const isRecovery = location.hash.includes("type=recovery");
    const { data: { session } } = await sb.auth.getSession();
    if (isRecovery) showSetPassword();      // let them set a new password, don't just log them in
    else if (session) ready();
    else { window.cloudUser = null; window.updateAuthBtn(); }  // no forced login — just show the Sign in bubble
  } catch (e) {
    console.warn("cloud layer unavailable:", e);
  }
}
</script>
<script>
/* register the service worker so the app is installable and works offline */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => navigator.serviceWorker.register("sw.js").catch(() => {}));
}
</script>
